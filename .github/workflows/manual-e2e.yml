name: Manual E2E Smoke and Release CI

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running manual CI verification'
        required: false
        default: 'Routine post-development validation'

jobs:
  validate:
    name: Build & E2E Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vexel
          POSTGRES_PASSWORD: vexel_password_2026
          POSTGRES_DB: vexel_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Schema Generate
        run: pnpm --filter @vexel/api exec prisma generate
        env:
          DATABASE_URL: postgresql://vexel:vexel_password_2026@localhost:5433/vexel_dev

      - name: Run Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://vexel:vexel_password_2026@localhost:5433/vexel_dev
          NEXT_PUBLIC_API_URL: http://127.0.0.1:9021

      - name: Run Linter
        run: pnpm lint

      - name: Run SDK Tests
        run: pnpm --filter @vexel/sdk test

      - name: Run API Tests
        run: pnpm --filter @vexel/api test
        env:
          DATABASE_URL: postgresql://vexel:vexel_password_2026@localhost:5433/vexel_dev
          REDIS_URL: redis://localhost:6380
          JWT_SECRET: vexel-dev-secret-change-in-production

      - name: Upload Logs and Assets on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-failure-reports
          path: |
            **/test-results/
            **/logs/
            **/*.log
