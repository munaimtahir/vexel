  # ─── Tenant Commands ──────────────────────────────────────────────────────
  /tenants/{tenantId}:enable-lims:
    post:
      operationId: enableLimsForTenant
      summary: Enable LIMS module for a tenant and optionally seed catalog
      description: |
        Command endpoint that enables the module.lims feature flag for the specified tenant.
        If seedCatalog is true (or seedMode is BASE_ON_ENABLE), seeds the tenant catalog from
        the platform base catalog once. Idempotent — second call with an already-seeded tenant
        returns a no-op summary.
      tags: [Tenants]
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                seedCatalog:
                  type: boolean
                  default: true
                seedMode:
                  type: string
                  enum: [BASE_ON_ENABLE, EMPTY, CUSTOM_UPLOAD]
                  default: BASE_ON_ENABLE
      responses:
        "200":
          description: Enable-LIMS result
          content:
            application/json:
              schema:
                type: object
                required: [limsEnabled, catalogSeeded]
                properties:
                  limsEnabled:
                    type: boolean
                  catalogSeeded:
                    type: boolean
                  catalogAlreadySeeded:
                    type: boolean
                  seedSummary:
                    type: object
                    nullable: true
                    properties:
                      inserted: { type: integer }
                      updated: { type: integer }
                      skipped: { type: integer }
                      baseVersion: { type: string }
                      hash: { type: string }
                  tenant:
                    $ref: '#/components/schemas/TenantSummary'
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tenants/{tenantId}/service-health:
    get:
      operationId: getTenantServiceHealth
      summary: Get per-tenant service health and LIMS snapshot (admin only)
      description: |
        Returns a read-only snapshot of service health probes (API, worker, PDF, DB, Redis)
        and LIMS operational metrics scoped to the given tenant. No workflow state is mutated.
      tags: [AdminTenants]
      security:
        - bearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        "200":
          description: Service health snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantServiceHealthResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

