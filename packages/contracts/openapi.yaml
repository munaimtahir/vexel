    post:
      operationId: recordOpdInvoicePayment
      summary: Record payment and transition invoice state (audited command)
      tags: [OPD Billing]
      description: |
        Records a payment (cash desk MVP) and applies invoice transitions:
        ISSUED -> PARTIALLY_PAID / PAID, PARTIALLY_PAID -> PAID.
        Invalid transitions or overpayment invariants return 409 Conflict.
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
