          type: string
        visitId:
          type: string
        providerId:
          type: string
        status:
          type: string
          enum: [DRAFT, SIGNED]
        subjectiveJson:
          nullable: true
        objectiveJson:
          nullable: true
        assessmentJson:
          nullable: true
        planJson:
          nullable: true
        diagnosisText:
          type: string
          nullable: true
        signedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OpdClinicalNoteUpsertRequest:
      type: object
      properties:
        providerId:
          type: string
        subjectiveJson:
          nullable: true
        objectiveJson:
          nullable: true
        assessmentJson:
          nullable: true
        planJson:
          nullable: true
        diagnosisText:
          type: string
          nullable: true

    OpdPrescriptionItem:
      type: object
      required: [medicationText, sortOrder]
      properties:
        id:
          type: string
          nullable: true
        sortOrder:
          type: integer
          minimum: 1
        medicationText:
          type: string
        dosageText:
          type: string
          nullable: true
        frequencyText:
          type: string
          nullable: true
        durationText:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true

    OpdPrescription:
      type: object
      required: [id, tenantId, visitId, providerId, status, items, createdAt, updatedAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        visitId:
          type: string
        providerId:
          type: string
        status:
          type: string
          enum: [DRAFT, SIGNED, PRINTED]
        notes:
          type: string
          nullable: true
        signedAt:
          type: string
          format: date-time
          nullable: true
        printedAt:
          type: string
          format: date-time
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OpdPrescriptionItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OpdPrescriptionUpsertRequest:
      type: object
      properties:
        providerId:
          type: string
        notes:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OpdPrescriptionItem'

    OpdInvoiceLine:
      type: object
      required: [description, quantity, unitPrice]
      properties:
        id:
          type: string
          nullable: true
        description:
          type: string
        quantity:
          type: number
          minimum: 0
        unitPrice:
          type: number
          minimum: 0
        discountAmount:
          type: number
          minimum: 0
          default: 0
        taxAmount:
          type: number
          minimum: 0
          default: 0
        total:
          type: number
          minimum: 0
          nullable: true

    OpdInvoicePayment:
      type: object
      required: [id, tenantId, invoiceId, amount, method, paidAt, createdAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        invoiceId:
          type: string
        amount:
          type: number
          minimum: 0
        method:
          type: string
          enum: [CASH]
        referenceNo:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        paidAt:
          type: string
          format: date-time
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    OpdInvoice:
      type: object
      required: [id, tenantId, patientId, status, currency, subtotal, grandTotal, createdAt, updatedAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        patientId:
          type: string
        visitId:
          type: string
          nullable: true
        appointmentId:
          type: string
          nullable: true
        invoiceNumber:
          type: string
          nullable: true
        status:
          type: string
          enum: [DRAFT, ISSUED, PARTIALLY_PAID, PAID, VOID]
        currency:
          type: string
          default: PKR
        subtotal:
          type: number
        discountTotal:
          type: number
        taxTotal:
          type: number
        grandTotal:
          type: number
        paidTotal:
          type: number
        balanceDue:
          type: number
        issuedAt:
          type: string
          format: date-time
          nullable: true
        voidedAt:
          type: string
          format: date-time
          nullable: true
        voidReason:
          type: string
          nullable: true
        note:
          type: string
          nullable: true
        lines:
          type: array
          items:
            $ref: '#/components/schemas/OpdInvoiceLine'
        payments:
          type: array
          items:
            $ref: '#/components/schemas/OpdInvoicePayment'
        invoiceDocumentId:
          type: string
          nullable: true
        receiptDocumentId:
          type: string
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OpdInvoiceCreateRequest:
      type: object
      required: [patientId, lines]
      properties:
        patientId:
          type: string
        visitId:
          type: string
        appointmentId:
          type: string
        currency:
          type: string
          default: PKR
        note:
          type: string
        lines:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OpdInvoiceLine'

    OpdInvoiceIssueRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true

    OpdInvoiceVoidRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    OpdInvoiceRecordPaymentRequest:
      type: object
      required: [amount, method]
      properties:
        amount:
          type: number
          exclusiveMinimum: 0
        method:
          type: string
          enum: [CASH]
        referenceNo:
          type: string
        note:
          type: string
        paidAt:
          type: string
          format: date-time

    OpdInvoiceListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OpdInvoice'
        pagination:
          $ref: '#/components/schemas/Pagination'

    OpdInvoicePaymentListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OpdInvoicePayment'

    OpdInvoicePaymentCommandResponse:
      type: object
      required: [invoice, payment]
      properties:
        invoice:
          $ref: '#/components/schemas/OpdInvoice'
        payment:
          $ref: '#/components/schemas/OpdInvoicePayment'

    OpdInvoiceReceiptCommandResponse:
      type: object
      required: [invoice, document]
      properties:
        invoice:
          $ref: '#/components/schemas/OpdInvoice'
        document:
          $ref: '#/components/schemas/Document'

    # ─── Ops / Backup Management ─────────────────────────────────────────────

    OpsStorageTarget:
      type: object
      required: [id, type, name, isEnabled, createdAt, updatedAt]
      properties:
        id:          { type: string }
        tenantId:    { type: string, nullable: true }
        type:        { type: string, enum: [LOCAL, S3, SSH] }
        name:        { type: string }
        configJson:  { type: object, nullable: true, description: "Non-secret config: path, bucket, endpoint, region, prefix" }
        isEnabled:   { type: boolean }
        createdAt:   { type: string, format: date-time }
        updatedAt:   { type: string, format: date-time }

    OpsBackupRun:
      type: object
      required: [id, type, status, createdAt, updatedAt]
      properties:
        id:                { type: string }
        type:              { type: string, enum: [FULL, TENANT_EXPORT, RESTORE, HEALTHCHECK] }
        tenantId:          { type: string, nullable: true }
        status:            { type: string, enum: [QUEUED, RUNNING, SUCCEEDED, FAILED, CANCELLED] }
        startedAt:         { type: string, format: date-time, nullable: true }
        finishedAt:        { type: string, format: date-time, nullable: true }
        artifactPath:      { type: string, nullable: true }
        artifactSizeBytes: { type: integer, nullable: true }
        checksumSha256:    { type: string, nullable: true }
        logPath:           { type: string, nullable: true }
        initiatedByUserId: { type: string, nullable: true }
        correlationId:     { type: string, nullable: true }
        errorSummary:      { type: string, nullable: true }
        metaJson:          { type: object, nullable: true }
        storageTargetId:   { type: string, nullable: true }
        storageTarget:     { $ref: '#/components/schemas/OpsStorageTarget', nullable: true }
        createdAt:         { type: string, format: date-time }
        updatedAt:         { type: string, format: date-time }

    OpsSchedule:
      type: object
      required: [id, type, cronExpression, isEnabled, retentionDays, createdAt, updatedAt]
      properties:
        id:                  { type: string }
        type:                { type: string, enum: [FULL_BACKUP, TENANT_EXPORT] }
        tenantId:            { type: string, nullable: true }
        cronExpression:      { type: string }
        isEnabled:           { type: boolean }
        retentionDays:       { type: integer }
        retentionPolicyJson: { type: object, nullable: true }
        storageTargets:
          type: array
          items: { $ref: '#/components/schemas/OpsStorageTarget' }
        createdAt:           { type: string, format: date-time }
        updatedAt:           { type: string, format: date-time }

    OpsDashboard:
      type: object
      required: [lastFullBackup, recentRuns, storageTargets, diskUsage, schedules]
      properties:
        lastFullBackup:     { $ref: '#/components/schemas/OpsBackupRun', nullable: true }
        lastHealthcheck:    { $ref: '#/components/schemas/OpsBackupRun', nullable: true }
        recentRuns:
          type: array
          items: { $ref: '#/components/schemas/OpsBackupRun' }
        storageTargets:
          type: array
          items: { $ref: '#/components/schemas/OpsStorageTarget' }
        schedules:
          type: array
          items: { $ref: '#/components/schemas/OpsSchedule' }
        diskUsage:
          type: object
          properties:
            backupsDirBytes:  { type: integer }
            backupsDirHuman:  { type: string }
            logsDirBytes:     { type: integer }
            logsDirHuman:     { type: string }

    OpsRunListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/OpsBackupRun' }
        pagination:
          type: object
          required: [total, limit, cursor]
          properties:
            total:      { type: integer }
            limit:      { type: integer }
            cursor:     { type: string, nullable: true }

    OpsRunLogsResponse:
      type: object
      required: [runId, lines, total]
      properties:
        runId:   { type: string }
        logPath: { type: string, nullable: true }
        lines:   { type: array, items: { type: string } }
        total:   { type: integer }
        offset:  { type: integer }

    OpsRunBackupFullRequest:
      type: object
      properties:
        includeDb:          { type: boolean, default: true }
        includeMinio:       { type: boolean, default: true }
        includeEnv:         { type: boolean, default: true }
        includeCaddy:       { type: boolean, default: true }
        storageTargetId:    { type: string, nullable: true }
        passphraseMode:     { type: string, enum: [SERVER_MANAGED, NONE], default: SERVER_MANAGED }

    OpsRunTenantExportRequest:
      type: object
      required: [tenantId]
      properties:
        tenantId:        { type: string }
        storageTargetId: { type: string, nullable: true }

    OpsRunResponse:
      type: object
      required: [runId, status, correlationId]
      properties:
        runId:         { type: string }
        status:        { type: string }
        correlationId: { type: string }

    OpsRestoreDryRunRequest:
      type: object
      required: [artifactPath]
      properties:
        artifactPath: { type: string }

    OpsRestoreRunRequest:
      type: object
      required: [artifactPath, confirmPhrase, preSnapshotEnabled]
      properties:
        artifactPath:       { type: string }
        confirmPhrase:      { type: string, description: "Must equal 'yes-restore' to confirm" }
        preSnapshotEnabled: { type: boolean, default: true }
        mode:               { type: string, enum: [DRY_RUN, APPLY], default: APPLY }

    OpsCreateStorageTargetRequest:
      type: object
      required: [type, name]
      properties:
        type:       { type: string, enum: [LOCAL, S3, SSH] }
        name:       { type: string }
        configJson: { type: object, nullable: true }
        isEnabled:  { type: boolean, default: true }

    OpsCreateScheduleRequest:
      type: object
      required: [type, cronExpression]
      properties:
        type:                { type: string, enum: [FULL_BACKUP, TENANT_EXPORT] }
        tenantId:            { type: string, nullable: true }
        cronExpression:      { type: string }
        isEnabled:           { type: boolean, default: true }
        retentionDays:       { type: integer, default: 30 }
        retentionPolicyJson: { type: object, nullable: true }
        storageTargetIds:    { type: array, items: { type: string } }

    OpsStorageTargetListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/OpsStorageTarget' }

    OpsScheduleListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/OpsSchedule' }

    # ─── Template Registry / Studio ──────────────────────────────────────────

    TemplateFamily:
      type: string
      enum:
        - GENERAL_TABLE
        - TWO_COLUMN_TABLE
        - PERIPHERAL_FILM_REPORT
        - HISTOPATH_NARRATIVE
        - GRAPHICAL_SCALE_REPORT
        - IMAGE_REPORT

    ResultSchemaType:
      type: string
      enum:
        - TABULAR
        - DESCRIPTIVE_HEMATOLOGY
        - HISTOPATHOLOGY
        - GRAPH_SERIES
        - IMAGE_ATTACHMENT
        - MIXED_STRUCTURED

    TemplateStatus:
      type: string
      enum:
        - DRAFT
        - ACTIVE
        - ARCHIVED

    TemplateBlueprintResponse:
      type: object
      required: [id, code, name, templateFamily, schemaType, isActive, sortOrder, createdAt, updatedAt]
      properties:
        id:                { type: string }
        code:              { type: string }
        name:              { type: string }
        templateFamily:    { $ref: '#/components/schemas/TemplateFamily' }
        schemaType:        { $ref: '#/components/schemas/ResultSchemaType' }
        defaultConfigJson: { type: object, nullable: true }
        isActive:          { type: boolean }
        sortOrder:         { type: integer }
        createdAt:         { type: string, format: date-time }
        updatedAt:         { type: string, format: date-time }

    PrintTemplateResponse:
      type: object
      required: [id, tenantId, code, name, schemaType, templateFamily, templateVersion, status, isSystemProvisioned, createdAt, updatedAt]
      properties:
        id:                   { type: string }
        tenantId:             { type: string }
        sourceBlueprintId:    { type: string, nullable: true }
        code:                 { type: string }
        name:                 { type: string }
        schemaType:           { $ref: '#/components/schemas/ResultSchemaType' }
        templateFamily:       { $ref: '#/components/schemas/TemplateFamily' }
        templateVersion:      { type: integer }
        status:               { $ref: '#/components/schemas/TemplateStatus' }
        configJson:           { type: object, nullable: true }
        isSystemProvisioned:  { type: boolean }
        createdByUserId:      { type: string, nullable: true }
        supersedesTemplateId: { type: string, nullable: true }
        createdAt:            { type: string, format: date-time }
        updatedAt:            { type: string, format: date-time }

    PrintTemplateListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/PrintTemplateResponse' }
        pagination:
          $ref: '#/components/schemas/Pagination'

    CreatePrintTemplateRequest:
      type: object
      required: [source]
      properties:
        source:
          type: string
          enum: [blueprint, clone, shell]
          description: "blueprint=from blueprint, clone=clone existing, shell=empty family shell"
        sourceBlueprintId:
          type: string
          nullable: true
          description: Required when source=blueprint
        sourceTemplateId:
          type: string
          nullable: true
          description: Required when source=clone
        templateFamily:
          $ref: '#/components/schemas/TemplateFamily'
          description: Required when source=shell
        schemaType:
          $ref: '#/components/schemas/ResultSchemaType'
          description: Required when source=shell
        name:
          type: string
        code:
          type: string
          description: Unique code within tenant. Auto-generated if omitted.

    UpdatePrintTemplateRequest:
      type: object
      properties:
        name:       { type: string }
        configJson: { type: object, nullable: true }

    CloneTemplateRequest:
      type: object
      properties:
        name: { type: string, description: Name for the cloned template }
        code: { type: string, description: Code for the cloned template. Auto-generated if omitted. }

    TestTemplateMappingResponse:
      type: object
      required: [id, tenantId, testId, templateId, isDefault, sortOrder, isEnabled, createdAt, updatedAt]
      properties:
        id:         { type: string }
        tenantId:   { type: string }
        testId:     { type: string }
        templateId: { type: string }
        isDefault:  { type: boolean }
        sortOrder:  { type: integer }
        isEnabled:  { type: boolean }
        template:   { $ref: '#/components/schemas/PrintTemplateResponse' }
        createdAt:  { type: string, format: date-time }
        updatedAt:  { type: string, format: date-time }

    TestTemplateMappingListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/TestTemplateMappingResponse' }
        testSchemaType:       { type: string }
        allowTemplateOverride: { type: boolean }
        defaultTemplateId:    { type: string, nullable: true }

    SetTestTemplateMappingRequest:
      type: object
      required: [mappings]
      properties:
        mappings:
          type: array
          items:
            type: object
            required: [templateId, isDefault]
            properties:
              templateId: { type: string }
              isDefault:  { type: boolean }
              sortOrder:  { type: integer, default: 0 }
              isEnabled:  { type: boolean, default: true }
        allowTemplateOverride:
          type: boolean
          description: Update test.allowTemplateOverride flag

    TemplatePreviewRequest:
      type: object
      properties:
        samplePayload: { type: object, description: Optional sample payload. Platform default used if omitted. }

    TemplatePreviewResponse:
      type: object
      required: [previewUrl]
      properties:
        previewUrl: { type: string, description: Temporary signed URL to the preview PDF }
        expiresAt:  { type: string, format: date-time }

    TemplateBlueprintListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/TemplateBlueprintResponse' }

    ProvisionDefaultsRequest:
      type: object
      properties:
        blueprintCodes:
          type: array
          items: { type: string }
          description: Specific blueprint codes to provision. All active blueprints used if omitted.
        overwriteExisting:
          type: boolean
          default: false

    # ─── Graphical Scale Config ───────────────────────────────────────────────

    ScaleStyle:
      type: string
      enum: [BAND_HIGHLIGHT, VALUE_MARKER]
      description: Visual style for the scale display. BAND_HIGHLIGHT fills the matched band. VALUE_MARKER places a pointer on the continuous scale.

    ColorToken:
      type: string
      enum: [GOOD, CAUTION, BAD, INFO, NEUTRAL]
      description: Semantic color token for band coloring. Renderer maps tokens to actual colors.

    SourceMode:
      type: string
      enum: [parameter_name_match, parameter_normalized_match]
      description: How the template parameter matches result data. parameter_name_match uses exact name; parameter_normalized_match uses lowercase/trimmed comparison.

    InterpretationBand:
      type: object
      required: [label, colorToken]
      properties:
        label:
          type: string
          description: Display label for this band (e.g. "Optimal", "High")
        min:
          type: number
          nullable: true
          description: Lower bound (inclusive). Null means open-ended (negative infinity).
        max:
          type: number
          nullable: true
          description: Upper bound (exclusive, last band inclusive). Null means open-ended (positive infinity).
        colorToken:
          $ref: '#/components/schemas/ColorToken'

    ScaleParameter:
      type: object
      required: [key, label, unit, sourceMode, sourceMatch, bands]
      properties:
        key:
          type: string
          description: Unique key for this parameter within the template
        label:
          type: string
          description: Display label shown on the report
        unit:
          type: string
          description: Unit string (e.g. mg/dL)
        sourceMode:
          $ref: '#/components/schemas/SourceMode'
        sourceMatch:
          type: string
          description: Value used to match against result parameter names
        skipIfMissing:
          type: boolean
          default: false
          description: When true, silently omit this parameter if not found in results. When false (default), show as missing.
        bands:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/InterpretationBand'

    GraphicalScaleConfig:
      type: object
      required: [parameters]
      properties:
        title:
          type: string
          description: Report section title
        subtitle:
          type: string
          description: Optional subtitle shown below title
        showDemographics:
          type: boolean
          default: true
        showInterpretationSummary:
          type: boolean
          default: true
          description: Show compact summary table at the end
        scaleStyle:
          $ref: '#/components/schemas/ScaleStyle'
        parameters:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ScaleParameter'

    BandValidationError:
      type: object
      required: [parameterKey, message]
      properties:
        parameterKey:
          type: string
        bandIndex:
          type: integer
          nullable: true
        field:
          type: string
          nullable: true
        message:
          type: string

    GraphicalScaleValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/BandValidationError'


paths:
  # ─── Health ───────────────────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      summary: API health check
      security: []
      tags: [Health]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        "200":
          description: Service is healthy
          headers:
            X-Correlation-ID:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /health/worker:
    get:
      operationId: getWorkerHealth
      summary: Worker health check
      security: []
      tags: [Health]
      responses:
        "200":
          description: Worker is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /health/pdf:
    get:
      operationId: getPdfHealth
      summary: PDF service health check
      security: []
      tags: [Health]
      responses:
        "200":
          description: PDF service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  # ─── Auth ─────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      summary: Login (admin or operator)
      security: []
      tags: [Auth]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      operationId: logout
      summary: Logout (revoke refresh token)
      tags: [Auth]
