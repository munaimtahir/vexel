      tags: [Encounters]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [testId]
              properties:
                testId:
                  type: string
                priority:
                  type: string
                  enum: [routine, stat, urgent]
                  default: routine
                totalAmount:
                  type: number
                  nullable: true
                discountAmount:
                  type: number
                  nullable: true
                discountPct:
                  type: number
                  nullable: true
                payableAmount:
                  type: number
                  nullable: true
                amountPaid:
                  type: number
                  nullable: true
                dueAmount:
                  type: number
                  nullable: true
