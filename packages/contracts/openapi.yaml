      responses:
        "200":
          description: Specimen collected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encounter'
        "409":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /encounters/{encounterId}:receive-specimen:
    post:
      operationId: receiveSpecimenLegacy
      summary: Mark specimen as received (legacy single-specimen endpoint)
      tags: [Encounters]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                labOrderId:
                  type: string
                receivedAt:
                  type: string
      responses:
        "200":
          description: Specimen received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encounter'
        "409":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /encounters/{encounterId}:result:
    post:
      operationId: enterResult
      summary: Enter lab result
      tags: [Encounters]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [labOrderId, value]
              properties:
                labOrderId:
                  type: string
                value:
                  type: string
                unit:
                  type: string
                referenceRange:
                  type: string
                flag:
                  type: string
                  enum: [normal, high, low, critical]
      responses:
        "200":
          description: Result entered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encounter'
        "409":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /encounters/{encounterId}:verify:
    post:
      operationId: verifyEncounterLegacy
      deprecated: true
      summary: "(deprecated) Verify lab results — use POST /verification/encounters/{encounterId}:verify instead"
      tags: [Encounters]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Encounter verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encounter'
        "409":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /encounters/{encounterId}:publish-report:
    post:
      operationId: publishEncounterReport
      summary: Publish rendered lab report and mark encounter as published (idempotent)
      tags: [Encounters]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report published and encounter moved to published
          content:
            application/json:
              schema:
                type: object
                properties:
                  encounter:
                    $ref: '#/components/schemas/Encounter'
                  document:
                    $ref: '#/components/schemas/Document'
        "409":
          description: Encounter not verified or report not rendered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /encounters/{encounterId}:cancel:
    post:
      operationId: cancelEncounter
      summary: Cancel encounter
      tags: [Encounters]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Encounter cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  status: { type: string }
        "409":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ─── Documents ────────────────────────────────────────────────────────────
  /documents/receipt:generate:
    post:
      operationId: generateReceipt
      summary: Generate a receipt document (idempotent by payload hash)
      tags: [Documents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReceiptGenerateRequest'
      responses:
        "200":
          description: Existing document returned (idempotent — same payloadHash)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "201":
          description: New document created and queued for render
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /documents/report:generate:
    post:
      operationId: generateReport
      summary: Generate a lab report document (idempotent by payload hash)
      tags: [Documents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportGenerateRequest'
      responses:
        "200":
          description: Existing document returned (idempotent — same payloadHash)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "201":
          description: New document created and queued for render
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "500":
          $ref: '#/components/responses/InternalServerError'

  /documents:
    get:
      operationId: listDocuments
      summary: List documents for the current tenant
      tags: [Documents]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, RENDERING, RENDERED, PUBLISHED, FAILED]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: encounterId
          in: query
          schema:
            type: string
          description: Filter documents by encounter ID
        - name: docType
          in: query
          schema:
            type: string
            enum: [RECEIPT, LAB_REPORT]
          description: Filter by document type
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  /documents/{id}:
    get:
      operationId: getDocument
      summary: Get a document by ID
      tags: [Documents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /documents/{id}:publish:
    post:
      operationId: publishDocument
      summary: Publish a RENDERED document (idempotent)
      tags: [Documents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document published (or already published)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Document not in RENDERED status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /documents/{id}/download:
    get:
      operationId: downloadDocument
      summary: Download PDF bytes
      tags: [Documents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PDF bytes
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /documents/{id}/render:
    get:
      operationId: renderDocument
      summary: Render PDF bytes with optional receipt format override
      tags: [Documents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [a4, thermal]
      responses:
        "200":
          description: Rendered PDF bytes
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  # ─── Sample Collection ────────────────────────────────────────────

  /sample-collection/worklist:
    get:
      operationId: getSampleCollectionWorklist
      summary: List encounters with pending specimen items
      tags: [SampleCollection]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, POSTPONED, RECEIVED]
            default: PENDING
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
          description: "Default: 3 days ago"
        - name: toDate
          in: query
          schema:
            type: string
            format: date
        - name: search
          in: query
          schema:
            type: string
          description: Search by MRN, patient name, or encounter code
      responses:
        "200":
          description: Sample collection worklist
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SampleCollectionEncounter'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  /encounters/{encounterId}:collect-specimens:
    post:
      operationId: collectSpecimens
      summary: Batch collect specimen items for an encounter
      tags: [SampleCollection]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                specimenItemIds:
                  type: array
                  items:
                    type: string
                  description: "IDs of SpecimenItems to collect; empty = collect all PENDING"
      responses:
        "200":
          description: Specimens collected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encounter'
        "409":
          description: Invalid state or no pending specimens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /encounters/{encounterId}:postpone-specimen:
    post:
      operationId: postponeSpecimen
      summary: Postpone a specimen item with a reason
      tags: [SampleCollection]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [specimenItemId, reason]
              properties:
                specimenItemId:
                  type: string
                reason:
                  type: string
                  minLength: 3
      responses:
        "200":
          description: Specimen postponed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecimenItem'
        "409":
          description: Specimen not in postponable state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /encounters/{encounterId}:receive-specimens:
    post:
      operationId: receiveSpecimens
      summary: Batch receive specimen items (requires lims.operator.sample.receiveSeparate.enabled)
      tags: [SampleCollection]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                specimenItemIds:
                  type: array
                  items:
                    type: string
                  description: "IDs of SpecimenItems to receive; empty = receive all COLLECTED"
      responses:
        "200":
          description: Specimens received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Encounter'
        "403":
          description: Feature flag disabled for tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  # ─── Financial endpoints ───────────────────────────────────────────────────

  /encounters/{encounterId}/financials:
    get:
      operationId: getEncounterFinancials
      tags: [Encounters]
      parameters:
        - { name: encounterId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  encounter:
                    type: object
                    properties:
                      id: { type: string }
                      encounterCode: { type: string, nullable: true }
                      status: { type: string }
                      patient:
                        type: object
                        properties:
                          id: { type: string }
                          firstName: { type: string }
                          lastName: { type: string }
                          mrn: { type: string }
                          mobile: { type: string }
                      labOrders:
                        type: array
                        items:
                          allOf:
                            - $ref: '#/components/schemas/LabOrderFinancials'
                            - type: object
                              properties:
                                id: { type: string }
                                status: { type: string }
                                testNameSnapshot: { type: string, nullable: true }
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/CashTransaction'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /encounters/{encounterId}:collect-due:
    post:
      operationId: collectDue
      tags: [Encounters]
      parameters:
        - { name: encounterId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { type: number }
                labOrderId: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  dueAmount: { type: number }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /encounters/{encounterId}:apply-discount:
    post:
      operationId: applyDiscount
      tags: [Encounters]
      parameters:
        - { name: encounterId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [discountAmount, reason]
              properties:
                discountAmount: { type: number }
                reason: { type: string }
                labOrderId: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  newPayable: { type: number }
                  newDue: { type: number }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  # ─── Results (test-level) ─────────────────────────────────────────

  /results/tests/pending:
    get:
      operationId: getPendingTests
      summary: List tests pending result entry
      tags: [Results]
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by MRN, patient name, order code, or test name
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Pending tests worklist
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderedTestSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  /results/tests/submitted:
    get:
      operationId: getSubmittedTests
      summary: List tests submitted for verification
      tags: [Results]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Submitted tests list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderedTestSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  /results/tests/{orderedTestId}:
    get:
      operationId: getOrderedTestDetail
      summary: Get test detail with parameter schema and current values
      tags: [Results]
      parameters:
        - name: orderedTestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ordered test with parameter values and lock state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderedTestDetail'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /results/tests/{orderedTestId}:save:
    post:
      operationId: saveTestResults
      summary: Save draft result values for a test (does not change status)
      tags: [Results]
      parameters:
        - name: orderedTestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [values]
              properties:
                values:
                  type: array
                  items:
                    type: object
                    required: [parameterId, value]
                    properties:
                      parameterId:
                        type: string
                      value:
                        type: string
      responses:
        "200":
          description: Values saved; test still in current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderedTestDetail'
        "403":
          description: Sample not collected; entry blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          $ref: '#/components/responses/NotFound'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /results/tests/{orderedTestId}:submit:
    post:
      operationId: submitTestResults
      summary: Submit test results for verification (locks non-empty values)
      tags: [Results]
      parameters:
        - name: orderedTestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Optional — submit without saving new values
      responses:
        "200":
          description: Test submitted; non-empty values locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderedTestDetail'
        "403":
          description: Sample not collected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          $ref: '#/components/responses/NotFound'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /results/tests/{orderedTestId}:submit-and-verify:
    post:
      operationId: submitAndVerifyTest
      summary: Submit + verify + trigger report generation in one command (requires result.verify permission)
      tags: [Results]
      parameters:
        - name: orderedTestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Optional body; command is idempotent
      responses:
        "200":
          description: Test submitted and verified; document pipeline enqueued
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderedTest:
                    $ref: '#/components/schemas/OrderedTestDetail'
                  documentJobId:
                    type: string
                    nullable: true
        "403":
          description: Insufficient permissions or sample not collected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          $ref: '#/components/responses/NotFound'
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ─── Verification ─────────────────────────────────────────────────

  /verification/encounters/pending:
    get:
      operationId: getVerificationQueue
      summary: List encounters with submitted tests pending verification
      tags: [Verification]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: view
          in: query
          schema:
            type: string
            enum: [pending, verified_today]
            default: pending
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Verification queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VerificationEncounterSummary'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  /verification/encounters/{encounterId}:
    get:
      operationId: getVerificationEncounterDetail
      summary: Get encounter with submitted tests for verification (only filled parameters)
      tags: [Verification]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Encounter verification detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  encounter:
                    $ref: '#/components/schemas/Encounter'
                  patient:
                    $ref: '#/components/schemas/Patient'
                  submittedTestsCount:
                    type: integer
                  pendingVerificationCount:
                    type: integer
                  testCards:
                    type: array
                    items:
                      $ref: '#/components/schemas/VerificationTestCard'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /verification/encounters/{encounterId}:verify:
    post:
      operationId: verifyEncounter
      summary: Verify all submitted tests for an encounter and trigger report generation
      tags: [Verification]
      parameters:
        - name: encounterId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: No body required
      responses:
        "200":
