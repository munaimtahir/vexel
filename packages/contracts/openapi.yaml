      tags: [Ops]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                required: [ok, message]
                properties:
                  ok:      { type: boolean }
                  message: { type: string }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  # ─── Template Registry / Studio ───────────────────────────────────────────

  /admin/template-blueprints:
    get:
      operationId: listTemplateBlueprints
      summary: List all active system template blueprints
      tags: [Templates]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        "200":
          description: Blueprint list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateBlueprintListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  /admin/template-blueprints/provision-defaults:
    post:
      operationId: provisionDefaultTemplates
      summary: Provision starter templates from blueprints into tenant space
      tags: [Templates]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionDefaultsRequest'
      responses:
        "200":
          description: Provisioned templates
          content:
            application/json:
              schema:
                type: object
                required: [provisioned, skipped]
                properties:
                  provisioned: { type: integer }
                  skipped:     { type: integer }
                  templates:
                    type: array
                    items: { $ref: '#/components/schemas/PrintTemplateResponse' }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  /admin/templates:
    get:
      operationId: listPrintTemplates
      summary: List tenant print templates
      tags: [Templates]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TemplateStatus'
        - name: schemaType
          in: query
          schema:
            $ref: '#/components/schemas/ResultSchemaType'
        - name: templateFamily
          in: query
          schema:
            $ref: '#/components/schemas/TemplateFamily'
      responses:
        "200":
          description: Template list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrintTemplateListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

    post:
      operationId: createPrintTemplate
      summary: Create a new tenant print template
      tags: [Templates]
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrintTemplateRequest'
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrintTemplateResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        "409":
          description: Conflict - code already in use
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

