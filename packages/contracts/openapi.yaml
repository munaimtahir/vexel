openapi: 3.1.0
info:
  title: Vexel Health API (LIMS-first)
  version: 0.1.0
  description: |
    Contract-first OpenAPI spec for Vexel Health Platform.
    All admin endpoints require bearerAuth.
    All requests should include X-Correlation-ID header.
    Tenant is resolved server-side (Host header in prod, x-tenant-id in dev when enabled).

servers:
  - url: /api

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Client-supplied correlation ID. If not provided, server generates one.
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [statusCode, message]
      properties:
        statusCode:
          type: integer
        message:
          type: string
        error:
          type: string
        correlationId:
          type: string

    Pagination:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        version:
          type: string
        uptime:
          type: number
        services:
          type: object
          additionalProperties:
            type: string

    TokenResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
        tokenType:
          type: string
          default: Bearer

    UserSummary:
      type: object
      required: [id, email, tenantId, status]
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        tenantId:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, disabled, pending]
        isSuperAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time

    AccountProfile:
      type: object
      required: [userId, email, displayName, firstName, lastName, tenantId, tenantName, roles, permissions]
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        tenantId:
          type: string
        tenantName:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        isSuperAdmin:
          type: boolean

    AccountProfileUpdateRequest:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 120

    AccountPasswordChangeRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
          maxLength: 128

    AdminNavigationItem:
      type: object
      required: [key, label, href, allowed]
      properties:
        key:
          type: string
        label:
          type: string
        href:
          type: string
        allowed:
          type: boolean

    AdminNavigationSummary:
      type: object
      required:
        [hasAdminAppAccess, hasAnyAdminPermission, landingPath, sections]
      properties:
        hasAdminAppAccess:
          type: boolean
        hasAnyAdminPermission:
          type: boolean
        landingPath:
          type: string
          description: Deterministic first allowed admin route for this user
        sections:
          type: array
          items:
            $ref: '#/components/schemas/AdminNavigationItem'

    TenantSummary:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        domains:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, suspended, trial]
        catalogSeedMode:
          type: string
          enum: [BASE_ON_ENABLE, EMPTY, CUSTOM_UPLOAD]
          nullable: true
        catalogSeededAt:
          type: string
          format: date-time
          nullable: true
        catalogSeedBaseVersion:
          type: string
          nullable: true
        catalogSeedHash:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    ServiceHealthBlock:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        latencyMs:
          type: number
          nullable: true
        error:
          type: string
          nullable: true

    WorkerHealthBlock:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        queues:
          type: object
          properties:
            documentRenderDepth:
              type: integer
            failedJobs24h:
              type: integer
        lastHeartbeatAt:
          type: string
          format: date-time
          nullable: true

    ApiHealthBlock:
      type: object
      required: [ok, version, uptimeSec]
      properties:
        ok:
          type: boolean
        version:
          type: string
        uptimeSec:
          type: number

    LimsSnapshot:
      type: object
      required: [pendingResults, pendingVerification, failedDocuments24h, publishedToday]
      properties:
        pendingResults:
          type: integer
          description: Encounters with ordered tests not fully resulted
        pendingVerification:
          type: integer
          description: Encounters in resulted state awaiting verification
        failedDocuments24h:
          type: integer
          description: Documents with FAILED status in the last 24 hours
        publishedToday:
          type: integer
          description: Documents published today (local midnight to now)

    TenantServiceHealthResponse:
      type: object
      required: [tenant, services, limsSnapshot]
      properties:
        tenant:
          type: object
          required: [id, name, domains, status]
          properties:
            id:
              type: string
            name:
              type: string
            domains:
              type: array
              items:
                type: string
            status:
              type: string
              enum: [active, disabled, suspended, trial]
            featureFlags:
              type: object
              additionalProperties: true
              nullable: true
        services:
          type: object
          required: [api, worker, pdf, db, redis]
          properties:
            api:
              $ref: '#/components/schemas/ApiHealthBlock'
            worker:
              $ref: '#/components/schemas/WorkerHealthBlock'
            pdf:
              $ref: '#/components/schemas/ServiceHealthBlock'
            db:
              $ref: '#/components/schemas/ServiceHealthBlock'
            redis:
              $ref: '#/components/schemas/ServiceHealthBlock'
        limsSnapshot:
          $ref: '#/components/schemas/LimsSnapshot'

    TenantConfig:
      type: object
      properties:
        brandName:
          type: string
        logoUrl:
          type: string
        primaryColor:
          type: string
        headerText:
          type: string
        footerText:
          type: string
        reportHeader:
          type: string
          description: Header text printed on generated PDF reports
        reportFooter:
          type: string
          description: Footer text printed on generated PDF reports

    Role:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          description: List of permission keys assigned to this role
          items:
            type: string
        isSystem:
          type: boolean
          description: True for built-in system roles that cannot be deleted

    FeatureFlagDefinition:
      type: object
      required: [key, app, group, label, description, valueType, status, buildStatus, defaultValue]
      properties:
        key:
          type: string
        app:
          type: string
          enum: [core, lims, opd, rad, ipd, printing]
        group:
          type: string
          enum: [main-apps, app-features]
        label:
          type: string
        description:
          type: string
        valueType:
          type: string
          enum: [boolean, enum]
        status:
          type: string
          enum: [implemented, planned, scaffold, deprecated]
        buildStatus:
          type: string
          enum: [built, scaffold, planned]
        defaultValue:
          type: boolean
        dependsOn:
          type: array
          items:
            type: string
        enumOptions:
          type: array
          items:
            type: string

    FeatureFlag:
      type: object
      required: [key, enabled]
      properties:
        key:
          type: string
        enabled:
          type: boolean
        description:
          type: string

    SampleType:
      type: object
      required: [id, tenantId, name, isActive]
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        externalId:
          type: string
          nullable: true
        userCode:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CatalogTest:
      type: object
      required: [id, tenantId, name]
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        description:
          type: string
        sampleType:
          type: string
        sampleTypeId:
          type: string
          nullable: true
        turnaroundHours:
          type: integer
        price:
          type: number
          minimum: 0
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        externalId:
          type: string
          nullable: true
        userCode:
          type: string
          nullable: true
        loincCode:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        specimenType:
          type: string
          nullable: true
        method:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    CatalogTestSearchResult:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        testCode:
          type: string
          nullable: true
        userCode:
          type: string
          nullable: true
        sampleTypeName:
          type: string
          nullable: true
        departmentName:
          type: string
          nullable: true
        price:
          type: number
          minimum: 0
          nullable: true

    TenantTopTestsUpdate:
      type: object
      required: [testIds]
      properties:
        testIds:
          type: array
          maxItems: 10
          items:
            type: string

    CatalogPanel:
      type: object
      required: [id, tenantId, name]
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        externalId:
          type: string
          nullable: true
        userCode:
          type: string
          nullable: true
        loincCode:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    Parameter:
      type: object
      required: [id, tenantId, name, dataType, isActive]
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        unit:
          type: string
        dataType:
          type: string
          enum: [numeric, text, boolean, coded]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        externalId:
          type: string
          description: Tenant-unique import identity key
          nullable: true
        userCode:
          type: string
          description: Tenant-specific daily-use local code
          nullable: true
        loincCode:
          type: string
          description: LOINC code for this parameter
          nullable: true
        resultType:
          type: string
          enum: [numeric, text, boolean, enum]
          description: Data type (renamed from dataType for clarity)
        defaultUnit:
          type: string
          description: UCUM unit string; required for numeric resultType
          nullable: true
        decimals:
          type: integer
          description: Decimal places for numeric results
          nullable: true
        allowedValues:
          type: array
          items:
            type: string
          description: Allowed values for enum resultType
          nullable: true
        defaultValue:
          type: string
          description: Default value for this parameter
          nullable: true

    TestParameterMapping:
      type: object
      required: [id, testId, parameterId]
      properties:
        id:
          type: string
        testId:
          type: string
        parameterId:
          type: string
        displayOrder:
          type: integer
          default: 0
        isRequired:
          type: boolean
          default: true
        unitOverride:
          type: string
          description: UCUM unit override for this test context
          nullable: true

    TestParameterMappingResponse:
      type: object
      required: [id, testId, parameterId]
      properties:
        id:
          type: string
        testId:
          type: string
        parameterId:
          type: string
        displayOrder:
          type: integer
          default: 0
        isRequired:
          type: boolean
          default: true
        unitOverride:
          type: string
          nullable: true

    PanelTestMapping:
      type: object
      required: [id, panelId, testId]
      properties:
        id:
          type: string
        panelId:
          type: string
        testId:
          type: string
        displayOrder:
          type: integer
          default: 0

    TestDefinition:
      type: object
      description: Complete ordered test definition for operator use
      required: [id, tenantId, name, parameters]
      properties:
        id:
          type: string
        tenantId:
          type: string
        code:
          type: string
        name:
          type: string
        externalId:
          type: string
          nullable: true
        userCode:
          type: string
          nullable: true
        loincCode:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        specimenType:
          type: string
          nullable: true
        method:
          type: string
          nullable: true
        price:
          type: number
          minimum: 0
          nullable: true
        isActive:
          type: boolean
        parameters:
          type: array
          description: Ordered parameters for this test
          items:
            $ref: '#/components/schemas/TestDefinitionParameter'

    TestDefinitionParameter:
      type: object
      required: [parameterId, name, displayOrder]
      properties:
        parameterId:
          type: string
        name:
          type: string
        userCode:
          type: string
          nullable: true
        loincCode:
          type: string
          nullable: true
        resultType:
          type: string
          enum: [numeric, text, boolean, enum]
        effectiveUnit:
          type: string
          description: unitOverride if set, else defaultUnit
          nullable: true
        decimals:
          type: integer
          nullable: true
        allowedValues:
          type: array
          items:
            type: string
          nullable: true
        defaultValue:
          type: string
          nullable: true
        displayOrder:
          type: integer
        isRequired:
          type: boolean

    PanelDefinition:
      type: object
      description: Complete ordered panel definition for operator use
      required: [id, tenantId, name, tests]
      properties:
        id:
          type: string
        tenantId:
          type: string
        code:
          type: string
        name:
          type: string
        externalId:
          type: string
          nullable: true
        userCode:
          type: string
          nullable: true
        loincCode:
          type: string
          nullable: true
        price:
          type: number
          minimum: 0
          nullable: true
        isActive:
          type: boolean
        tests:
          type: array
          description: Ordered tests in this panel
          items:
            $ref: '#/components/schemas/PanelDefinitionTest'

    PanelDefinitionTest:
      type: object
      required: [testId, name, displayOrder]
      properties:
        testId:
          type: string
        name:
          type: string
        userCode:
          type: string
          nullable: true
        loincCode:
          type: string
          nullable: true
        displayOrder:
          type: integer
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/TestDefinitionParameter'

    ImportJob:
      type: object
      required: [id, tenantId, status, createdAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        status:
          type: string
          enum: [pending, validating, validated, applying, applied, failed]
        mode:
          type: string
          enum: [CREATE_ONLY, UPSERT_PATCH]
        summary:
          type: object
          nullable: true
          properties:
            inserted:
              type: integer
            updated:
              type: integer
            skipped:
              type: integer
            errors:
              type: integer
        errorCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    ExportJob:
      type: object
      required: [id, tenantId, status, createdAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        format:
          type: string
          enum: [xlsx, csv]
        downloadUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    ReferenceRange:
      type: object
      required: [id, tenantId, parameterId]
      properties:
        id:
          type: string
        tenantId:
          type: string
        parameterId:
          type: string
        testId:
          type: string
        gender:
          type: string
          enum: [M, F]
          nullable: true
        ageMinYears:
          type: integer
          nullable: true
        ageMaxYears:
          type: integer
          nullable: true
        lowValue:
          type: number
          nullable: true
        highValue:
          type: number
          nullable: true
        criticalLow:
          type: number
          nullable: true
        criticalHigh:
          type: number
          nullable: true
        unit:
          type: string

    JobRun:
      type: object
      required: [id, tenantId, type, status, correlationId, createdBy, createdAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        type:
          type: string
          enum: [catalog.import, catalog.export]
        status:
          type: string
          enum: [queued, running, completed, failed]
        payloadHash:
          type: string
          nullable: true
        correlationId:
          type: string
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        resultSummary:
          type: object
          nullable: true
          properties:
            created:
              type: integer
            updated:
              type: integer
            skipped:
              type: integer
            total:
              type: integer
        errorSummary:
          type: string
          nullable: true
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time

    CatalogImportPayload:
      type: object
      properties:
        tests:
          type: array
          items:
            type: object
            required: [externalId, name]
            properties:
              externalId:
                type: string
              name:
                type: string
              description:
                type: string
              userCode:
                type: string
              department:
                type: string
              sampleType:
                type: string
              specimenType:
                type: string
              method:
                type: string
              loincCode:
                type: string
              turnaroundHours:
                type: integer
              price:
                type: number
                minimum: 0
                nullable: true
              isActive:
                type: boolean
        parameters:
          type: array
          items:
            type: object
            required: [externalId, name]
            properties:
              externalId:
                type: string
              name:
                type: string
              unit:
                type: string
              userCode:
                type: string
              loincCode:
                type: string
              dataType:
                type: string
                enum: [numeric, text, boolean, coded]
              resultType:
                type: string
              defaultUnit:
                type: string
              decimals:
                type: integer
              allowedValues:
                type: string
              defaultValue:
                type: string
              isActive:
                type: boolean
        panels:
          type: array
          items:
            type: object
            required: [externalId, name]
            properties:
              externalId:
                type: string
              name:
                type: string
              description:
                type: string
              userCode:
                type: string
              loincCode:
                type: string
              price:
                type: number
                minimum: 0
                nullable: true
              isActive:
                type: boolean
        mappings:
          type: array
          items:
            type: object
            properties:
              testExternalId:
                type: string
              parameterExternalId:
                type: string
              ordering:
                type: integer
              displayOrder:
                type: integer
              isRequired:
                type: boolean
              unitOverride:
                type: string
        panelMappings:
          type: array
          items:
            type: object
            properties:
              panelExternalId:
                type: string
              testExternalId:
                type: string
              ordering:
                type: integer
              displayOrder:
                type: integer

    AuditEvent:
      type: object
      required: [id, tenantId, action, createdAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        actorUserId:
          type: string
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        correlationId:
          type: string
        before:
          type: object
          nullable: true
        after:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time

    Job:
      type: object
      required: [id, queue, status]
      properties:
        id:
          type: string
        queue:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [waiting, active, completed, failed, delayed]
        data:
          type: object
        failedReason:
          type: string
          nullable: true
        attemptsMade:
          type: integer
        createdAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true

    PermissionKey:
      type: string
      enum:
        - admin.super
        - tenant.read
        - tenant.create
        - tenant.update
        - user.read
        - user.create
        - user.update
        - user.disable
        - role.read
        - role.create
        - role.update
        - role.delete
        - role.assign
        - feature_flag.read
        - feature_flag.set
        - catalog.read
        - catalog.write
        - catalog.manage
        - audit.read
        - job.read
        - job.retry
        - branding.read
        - branding.write
        - patient.manage
        - encounter.manage
        - result.enter
        - result.verify

    Patient:
      type: object
      required: [id, tenantId, firstName, lastName, mrn, createdAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date
          nullable: true
        ageYears:
          type: integer
          nullable: true
        gender:
          type: string
          nullable: true
        mrn:
          type: string
        mobile:
          type: string
          nullable: true
        cnic:
          type: string
