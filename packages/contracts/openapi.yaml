    post:
      operationId: voidOpdInvoice
      summary: Transition invoice to VOID (audited command)
      tags: [OPD Billing]
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
