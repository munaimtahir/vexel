            type: string
        - name: appointmentId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, ISSUED, PARTIALLY_PAID, PAID, VOID]
        - name: createdFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          schema:
            type: string
            format: date-time
        - name: search
          in: query
          schema:
            type: string
          description: Search by invoice number or patient-facing identifiers (tenant-scoped)
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpdInvoiceListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createOpdInvoice
      summary: Create OPD invoice draft
      tags: [OPD Billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpdInvoiceCreateRequest'
      responses:
        "201":
          description: Invoice draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpdInvoice'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
